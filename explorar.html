<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar Nightnotes</title>
  <link rel="stylesheet" href="css/explorar.css">
</head>
<body>
<div class="app-container">
 
  <header class="topbar">
    <div class="logo">
      <div class="logo-circle"><img src="img/fundo.png" alt="Logo"></div>
      <span>Nightnotes</span>
    </div>
    <div class="topbar-right">
      <a href="index.html" color="white">
            <span class="back-button">Voltar &larr;</span>
      </a>
      <span class="heart">&hearts;</span>
    </div>
  </header>

  <section class="hero">
    <div class="hero-left">
      <h1>Vamos ouvir<br>algo novo<br>hoje?...</h1>
    </div>
    
    <div class="recomendacao-container">
      <p class="subtitulo-semana">Recomendação<br>da semana:</p>
      <div class="capas-carrossel">
        <span class="carousel-arrow">&lsaquo;&lsaquo;</span>
        <img src="img/recomendacao1.jpg" alt="Capa 1">
        <img src="img/recomendacao2.jpg" alt="Capa 2">
        <img src="img/recomendacao3.jpg" alt="Capa 3">
        <img src="img/recomendacao4.jpg" alt="Capa 4">
        <img src="img/recomendacao5.jpg" alt="Capa 5">
        <span class="carousel-arrow">&rsaquo;&rsaquo;</span>
      </div>
    </div>
  </section>

  <main class="content">
    <div class="left-side">
     
      <section class="section">
        <h2>ARTISTAS</h2>
        <div class="cards">
          <div class="card">
            <img src="img/artista1.png" alt="Artista 1">
            <button class="play-btn">&#9658;</button>
          </div>
          <div class="card">
            <img src="img/artista2.png" alt="Artista 2">
            <button class="play-btn">&#9658;</button>
          </div>
          <div class="card">
            <img src="img/artista3.png" alt="Artista 3">
            <button class="play-btn">&#9658;</button>
          </div>
        </div>
      </section>

      <section class="section">
        <h2>ALBÚMS</h2>
        <div class="cards">
          <div class="card">
            <img src="img/album1.jpg" alt="Álbum 1">
            <button class="play-btn">&#9658;</button>
          </div>
          <div class="card">
            <img src="img/album2.jpg" alt="Álbum 2">
            <button class="play-btn">&#9658;</button>
          </div>
          <div class="card">
            <img src="img/album3.jpg" alt="Álbum 3">
            <button class="play-btn">&#9658;</button>
          </div>
        </div>
      </section>

    </div>

    <aside class="sidebar">
      <div class="sidebar-title">Artistas mais ouvidos da região</div>
      <div class="ranking">
        <div class="rankartista">
          <img class="artista-foto" src="img/veigh.jpg" alt="Veigh">
          <div class="rank-detalhes">
            <span class="rank-nome">Veigh</span>
            <span class="rank-ouvintes">9.600.000,70</span>
          </div>
        </div>
        <div class="rankartista">
          <img class="artista-foto" src="img/bk ft.jpg" alt="BK">
          <div class="rank-detalhes">
            <span class="rank-nome">BK</span>
            <span class="rank-ouvintes">8.000.000,00</span>
          </div>
        </div>
        <div class="ranking-chevron">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>
    </aside>
  </main>
</div>
</body>
</html>
