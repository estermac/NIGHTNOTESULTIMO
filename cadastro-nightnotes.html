<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de cadastro</title>
  <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
  <div class="pagina">
    <header class="cabecalho">
      <a href="index.html" style="text-decoration: none; width: 100%;">
        <button class="botao-voltar" type="button">Voltar</button>
      </a>
    </header>

    <main class="conteudo">
      <section class="apresentacao">
        <img src="img/fone_de_ouvido-removebg-preview.png" alt="Fone de ouvido" class="fone">
        <h1 class="apresentacaotitulo">
          Transforme cada noite em uma playlist inesquecível.
        </h1>
        <p class="apresentacaotexto">
          Para que possamos te conhecer mais, registre um cadastro rápido e comece a usufruir das suas músicas!
        </p>
      </section>
      
      <section class="cadastro">
        <h2 class="cadastrotitulo">Cadastre-se</h2>

        <form class="formulario">
          <input class="formulario__campo" type="text" placeholder="Nome">
          <input class="formulario__campo" type="email" placeholder="Email">
          <input class="formulario__campo" type="date">
          <input class="formulario__campo" type="text" placeholder="@Nome de usuário">
          <input class="formulario__campo" type="password" placeholder="Senha">
          <input class="formulario__campo" type="password" placeholder="Confirmar senha">
          
          <a href="index.html" style="text-decoration: none; width: 100%;">
            <button class="formulario__botao" type="button" style="width: 100%;">Cadastrar</button>
          </a>

          <a href="loginpag.html" style="text-decoration: none; width: 100%;">
            <button class="formulario__botao" type="button" style="width: 100%;">Já possui uma conta? Login</button>
          </a>
        </form>
      </section>
    </main>

    <footer class="rodape"></footer>
  </div>
</body>
</html>
